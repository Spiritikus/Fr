<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Озвучивание текста на французском</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 750px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #2d3748;
            font-size: 32px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .subtitle {
            color: #718096;
            font-size: 16px;
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 16px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .counter {
            text-align: right;
            color: #a0aec0;
            font-size: 14px;
            margin-top: 8px;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 35px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-speak {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-speak:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-speak:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #e2e8f0;
            color: #2d3748;
        }

        .btn-clear:hover {
            background: #cbd5e0;
        }

        .btn-download {
            background: #48bb78;
            color: white;
        }

        .btn-download:hover:not(:disabled) {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.4);
        }

        .btn-download:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-play {
            background: #4299e1;
            color: white;
        }

        .btn-play:hover:not(:disabled) {
            background: #3182ce;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(66, 153, 225, 0.4);
        }

        .btn-play:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 14px 18px;
            background: #f7fafc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            color: #4a5568;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .dot.idle { background: #a0aec0; }
        .dot.speaking { 
            background: #48bb78; 
            animation: pulse 1s infinite;
        }
        .dot.done { background: #4299e1; }
        .dot.error { background: #fc8181; }
        .dot.converting { background: #ed8936; animation: pulse 0.5s infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }

        .audio-section {
            margin-top: 20px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 12px;
            display: none;
        }

        .audio-section.show {
            display: block;
        }

        .audio-section audio {
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }

        .audio-controls {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .audio-controls .btn {
            padding: 10px 24px;
            font-size: 14px;
        }

        .message {
            padding: 12px;
            background: #ebf8ff;
            border-radius: 8px;
            color: #2b6cb0;
            text-align: center;
            margin-bottom: 12px;
        }

        .message.success { background: #f0fff4; color: #276749; }
        .message.error { background: #fff5f5; color: #c53030; }
        .message.info { background: #ebf8ff; color: #2b6cb0; }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .download-info {
            margin-top: 8px;
            font-size: 13px;
            color: #718096;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇫🇷 Озвучивание текста</h1>
        <p class="subtitle">Вставьте текст на французском языке и нажмите кнопку для создания аудио</p>
        
        <textarea id="textInput">Bonjour à tous ! Aujourd'hui, nous allons explorer la beauté de la langue française.</textarea>
        
        <div class="counter" id="charCount">0 символов</div>
        
        <div class="buttons">
            <button class="btn btn-speak" id="speakBtn">🔊 Создать аудио</button>
            <button class="btn btn-clear" id="clearBtn">🗑️ Очистить</button>
        </div>
        
        <div class="status">
            <span class="dot idle" id="statusDot"></span>
            <span id="statusText">Готово</span>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="fill" id="progressFill"></div>
        </div>
        
        <div class="audio-section" id="audioSection">
            <div class="message info" id="audioMessage">✅ Аудио готово! Используйте плеер для прослушивания.</div>
            <audio id="audioPlayer" controls></audio>
            <div class="audio-controls">
                <button class="btn btn-play" id="playBtn">▶️ Воспроизвести</button>
                <button class="btn btn-download" id="downloadBtn">⬇️ Скачать MP3</button>
                <button class="btn btn-clear" id="playAgainBtn" style="padding: 10px 24px; font-size: 14px;">
                    🔄 Заново
                </button>
            </div>
            <div class="download-info">Файл конвертируется в MP3 при скачивании</div>
        </div>
    </div>

    <!-- Подключаем библиотеки для конвертации в MP3 -->
    <script src="https://cdn.jsdelivr.net/npm/opus-recorder@8.0.3/dist/opus-recorder.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>

    <script>
        // Получаем все элементы
        const textInput = document.getElementById('textInput');
        const speakBtn = document.getElementById('speakBtn');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const playBtn = document.getElementById('playBtn');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const charCount = document.getElementById('charCount');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const audioSection = document.getElementById('audioSection');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioMessage = document.getElementById('audioMessage');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        // Переменные
        let audioBlob = null;
        let audioUrl = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let mp3Data = null;
        let audioContext = null;

        // Обновление счетчика
        function updateCounter() {
            const len = textInput.value.length;
            charCount.textContent = len + ' символов';
        }

        // Обновление статуса
        function setStatus(text, type = 'idle') {
            statusText.textContent = text;
            statusDot.className = 'dot ' + type;
        }

        // Обновление прогресса
        function updateProgress(value) {
            progressFill.style.width = value + '%';
        }

        // Показать сообщение
        function showMessage(text, type = 'info') {
            audioMessage.textContent = text;
            audioMessage.className = 'message ' + type;
        }

        // Сброс аудио
        function resetAudio() {
            audioSection.classList.remove('show');
            audioPlayer.pause();
            audioPlayer.src = '';
            if (audioUrl) {
                URL.revokeObjectURL(audioUrl);
                audioUrl = null;
            }
            audioBlob = null;
            mp3Data = null;
            audioChunks = [];
            downloadBtn.disabled = true;
            playBtn.disabled = true;
            progressBar.classList.remove('active');
            updateProgress(0);
        }

        // Конвертация WAV в MP3 с помощью lamejs
        function wavToMp3(wavBlob) {
            return new Promise((resolve, reject) => {
                try {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const arrayBuffer = e.target.result;
                            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                            
                            audioCtx.decodeAudioData(arrayBuffer, function(buffer) {
                                try {
                                    // Конвертируем в MP3
                                    const channels = 1;
                                    const sampleRate = 22050;
                                    const kbps = 128;
                                    
                                    const length = buffer.length;
                                    const samples = new Int16Array(length);
                                    const channelData = buffer.getChannelData(0);
                                    
                                    for (let i = 0; i < length; i++) {
                                        samples[i] = Math.max(-32768, Math.min(32767, Math.round(channelData[i] * 32767)));
                                    }
                                    
                                    const mp3encoder = new lamejs.Mp3Encoder(channels, sampleRate, kbps);
                                    const mp3Data = [];
                                    const sampleBlockSize = 1152;
                                    
                                    for (let i = 0; i < samples.length; i += sampleBlockSize) {
                                        const sampleChunk = samples.subarray(i, i + sampleBlockSize);
                                        const mp3buf = mp3encoder.encodeBuffer(sampleChunk);
                                        if (mp3buf.length > 0) {
                                            mp3Data.push(mp3buf);
                                        }
                                    }
                                    
                                    const mp3buf = mp3encoder.flush();
                                    if (mp3buf.length > 0) {
                                        mp3Data.push(mp3buf);
                                    }
                                    
                                    const mp3Blob = new Blob(mp3Data, { type: 'audio/mp3' });
                                    resolve(mp3Blob);
                                    
                                } catch (error) {
                                    reject('Ошибка конвертации: ' + error.message);
                                }
                            }, function(error) {
                                reject('Ошибка декодирования: ' + error);
                            });
                        } catch (error) {
                            reject('Ошибка обработки: ' + error);
                        }
                    };
                    reader.onerror = function() {
                        reject('Ошибка чтения файла');
                    };
                    reader.readAsArrayBuffer(wavBlob);
                } catch (error) {
                    reject('Ошибка: ' + error);
                }
            });
        }

        // Запись аудио с использованием MediaRecorder (WebM) и конвертация в WAV
        async function recordAudio(text) {
            return new Promise((resolve, reject) => {
                try {
                    // Создаем AudioContext для захвата звука
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // Создаем MediaStream из синтеза речи
                    // Используем осциллятор для теста? Нет, используем реальный синтез
                    
                    // Создаем MediaStreamDestination
                    const destination = audioCtx.createMediaStreamDestination();
                    
                    // Создаем генератор речи
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'fr-FR';
                    utterance.rate = 0.9;
                    utterance.pitch = 1;
                    
                    // Ищем французский голос
                    const voices = window.speechSynthesis.getVoices();
                    const frenchVoice = voices.find(v => v.lang.startsWith('fr'));
                    if (frenchVoice) {
                        utterance.voice = frenchVoice;
                    }
                    
                    // Настраиваем MediaRecorder
                    const recorder = new MediaRecorder(destination.stream, {
                        mimeType: 'audio/webm;codecs=opus'
                    });
                    
                    const chunks = [];
                    
                    recorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            chunks.push(event.data);
                        }
                    };
                    
                    recorder.onstop = async () => {
                        try {
                            const webmBlob = new Blob(chunks, { type: 'audio/webm' });
                            resolve(webmBlob);
                        } catch (error) {
                            reject(error);
                        }
                    };
                    
                    // Запускаем запись
                    recorder.start();
                    
                    // Воспроизводим речь
                    utterance.onstart = () => {
                        setStatus('Говорит... 🎙️', 'speaking');
                        updateProgress(30);
                    };
                    
                    utterance.onend = () => {
                        setTimeout(() => {
                            if (recorder.state === 'recording') {
                                recorder.stop();
                                updateProgress(80);
                            }
                        }, 500);
                    };
                    
                    utterance.onerror = (event) => {
                        if (recorder.state === 'recording') {
                            recorder.stop();
                        }
                        reject(event);
                    };
                    
                    window.speechSynthesis.speak(utterance);
                    
                    // Таймаут
                    setTimeout(() => {
                        if (recorder.state === 'recording') {
                            recorder.stop();
                            reject(new Error('Таймаут записи'));
                        }
                    }, 30000);
                    
                } catch (error) {
                    reject(error);
                }
            });
        }

        // Основная функция озвучивания
        async function speakText() {
            const text = textInput.value.trim();

            if (!text) {
                alert('Пожалуйста, введите текст на французском языке.');
                return;
            }

            if (!window.speechSynthesis) {
                alert('Ваш браузер не поддерживает синтез речи.');
                return;
            }

            // Останавливаем текущую речь
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            resetAudio();
            setStatus('Подготовка...', 'idle');
            speakBtn.disabled = true;
            downloadBtn.disabled = true;
            playBtn.disabled = true;
            showMessage('⏳ Запись началась...', 'info');
            progressBar.classList.add('active');
            updateProgress(10);

            try {
                // Записываем аудио
                const webmBlob = await recordAudio(text);
                
                // Создаем аудио URL для плеера
                audioUrl = URL.createObjectURL(webmBlob);
                audioPlayer.src = audioUrl;
                
                // Сохраняем blob
                audioBlob = webmBlob;
                
                // Показываем аудио секцию
                audioSection.classList.add('show');
                playBtn.disabled = false;
                downloadBtn.disabled = false;
                setStatus('Аудио создано ✅', 'done');
                speakBtn.disabled = false;
                showMessage('✅ Аудио готово! Нажмите "Скачать MP3" для сохранения.', 'success');
                progressBar.classList.remove('active');
                updateProgress(100);
                
            } catch (error) {
                console.error('Ошибка:', error);
                setStatus('Ошибка', 'error');
                speakBtn.disabled = false;
                showMessage('❌ Ошибка: ' + error.message, 'error');
                progressBar.classList.remove('active');
            }
        }

        // Скачивание MP3
        async function downloadAudio() {
            if (!audioBlob) {
                alert('Сначала создайте аудио.');
                return;
            }

            try {
                downloadBtn.disabled = true;
                downloadBtn.textContent = '⏳ Конвертация...';
                setStatus('Конвертация в MP3...', 'converting');
                showMessage('🔄 Конвертация в MP3... Подождите...', 'info');
                progressBar.classList.add('active');
                updateProgress(30);

                // Конвертируем WebM в MP3 через WAV
                // Сначала конвертируем WebM в WAV
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const arrayBuffer = await audioBlob.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                updateProgress(50);
                
                // Создаем WAV из audioBuffer
                const wavBlob = await audioBufferToWav(audioBuffer);
                
                updateProgress(70);
                
                // Конвертируем WAV в MP3
                const mp3Blob = await wavToMp3(wavBlob);
                
                updateProgress(100);
                
                // Скачиваем MP3
                const link = document.createElement('a');
                link.href = URL.createObjectURL(mp3Blob);
                link.download = 'озвучка_французский.mp3';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                showMessage('✅ MP3 файл успешно скачан!', 'success');
                setStatus('Готово ✅', 'done');
                
                setTimeout(() => {
                    progressBar.classList.remove('active');
                    updateProgress(0);
                }, 1000);

            } catch (error) {
                console.error('Ошибка конвертации:', error);
                showMessage('❌ Ошибка конвертации в MP3: ' + error.message, 'error');
                setStatus('Ошибка', 'error');
                progressBar.classList.remove('active');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.textContent = '⬇️ Скачать MP3';
            }
        }

        // Конвертация AudioBuffer в WAV
        function audioBufferToWav(buffer) {
            return new Promise((resolve) => {
                const numOfChan = buffer.numberOfChannels;
                const length = buffer.length * numOfChan * 2;
                const sampleRate = buffer.sampleRate;
                
                const wavData = new ArrayBuffer(44 + length);
                const view = new DataView(wavData);
                
                // RIFF идентификатор
                writeString(view, 0, 'RIFF');
                view.setUint32(4, 36 + length, true);
                writeString(view, 8, 'WAVE');
                writeString(view, 12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, numOfChan, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * numOfChan * 2, true);
                view.setUint16(32, numOfChan * 2, true);
                view.setUint16(34, 16, true);
                writeString(view, 36, 'data');
                view.setUint32(40, length, true);
                
                // Записываем аудио данные
                const channels = [];
                for (let i = 0; i < numOfChan; i++) {
                    channels.push(buffer.getChannelData(i));
                }
                
                let offset = 44;
                for (let i = 0; i < buffer.length; i++) {
                    for (let channel = 0; channel < numOfChan; channel++) {
                        const sample = Math.max(-1, Math.min(1, channels[channel][i]));
                        const intSample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                        view.setInt16(offset, intSample, true);
                        offset += 2;
                    }
                }
                
                const blob = new Blob([wavData], { type: 'audio/wav' });
                resolve(blob);
            });
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        // Воспроизведение
        function playAudio() {
            if (audioUrl) {
                audioPlayer.play();
                setStatus('Воспроизведение...', 'speaking');
                audioPlayer.onplay = () => setStatus('Воспроизведение...', 'speaking');
                audioPlayer.onended = () => setStatus('Готово ✅', 'done');
                audioPlayer.onpause = () => setStatus('Готово ✅', 'done');
            } else {
                alert('Сначала создайте аудио.');
            }
        }

        // Очистка
        function clearText() {
            textInput.value = '';
            updateCounter();
            setStatus('Очищено', 'idle');
            resetAudio();
            if (window.speechSynthesis && window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            speakBtn.disabled = false;
            downloadBtn.disabled = true;
            playBtn.disabled = true;
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                isRecording = false;
            }
            showMessage('✅ Аудио готово! Используйте плеер для прослушивания.', 'info');
        }

        // Повторное создание
        function playAgain() {
            speakText();
        }

        // Назначаем обработчики
        speakBtn.addEventListener('click', speakText);
        clearBtn.addEventListener('click', clearText);
        downloadBtn.addEventListener('click', downloadAudio);
        playBtn.addEventListener('click', playAudio);
        playAgainBtn.addEventListener('click', playAgain);
        textInput.addEventListener('input', updateCounter);

        // Загружаем голоса
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }

        // Инициализация
        updateCounter();
        setStatus('Готово', 'idle');
        downloadBtn.disabled = true;
        playBtn.disabled = true;
    </script>
</body>
</html>
