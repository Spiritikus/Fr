<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Озвучивание текста на французском</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 750px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #2d3748;
            font-size: 32px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .subtitle {
            color: #718096;
            font-size: 16px;
            margin-bottom: 25px;
        }

        textarea {
            width: 100%;
            height: 200px;
            padding: 16px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .counter {
            text-align: right;
            color: #a0aec0;
            font-size: 14px;
            margin-top: 8px;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 35px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-speak {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-speak:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-speak:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #e2e8f0;
            color: #2d3748;
        }

        .btn-clear:hover {
            background: #cbd5e0;
        }

        .btn-download {
            background: #48bb78;
            color: white;
        }

        .btn-download:hover:not(:disabled) {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.4);
        }

        .btn-download:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-play {
            background: #4299e1;
            color: white;
        }

        .btn-play:hover:not(:disabled) {
            background: #3182ce;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(66, 153, 225, 0.4);
        }

        .btn-play:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 20px;
            padding: 14px 18px;
            background: #f7fafc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            color: #4a5568;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
        }

        .dot.idle { background: #a0aec0; }
        .dot.speaking { 
            background: #48bb78; 
            animation: pulse 1s infinite;
        }
        .dot.done { background: #4299e1; }
        .dot.error { background: #fc8181; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.4); }
        }

        .audio-section {
            margin-top: 20px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 12px;
            display: none;
        }

        .audio-section.show {
            display: block;
        }

        .audio-section audio {
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }

        .audio-controls {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .audio-controls .btn {
            padding: 10px 24px;
            font-size: 14px;
        }

        .message {
            padding: 12px;
            background: #ebf8ff;
            border-radius: 8px;
            color: #2b6cb0;
            text-align: center;
            margin-bottom: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .download-info {
            margin-top: 8px;
            font-size: 13px;
            color: #718096;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇫🇷 Озвучивание текста</h1>
        <p class="subtitle">Вставьте текст на французском языке и нажмите кнопку для создания аудио</p>
        
        <textarea id="textInput">Bonjour à tous ! Aujourd'hui, nous allons explorer la beauté de la langue française.</textarea>
        
        <div class="counter" id="charCount">0 символов</div>
        
        <div class="buttons">
            <button class="btn btn-speak" id="speakBtn">🔊 Создать аудио</button>
            <button class="btn btn-clear" id="clearBtn">🗑️ Очистить</button>
        </div>
        
        <div class="status">
            <span class="dot idle" id="statusDot"></span>
            <span id="statusText">Готово</span>
        </div>

        <div class="progress-bar" id="progressBar">
            <div class="fill" id="progressFill"></div>
        </div>
        
        <div class="audio-section" id="audioSection">
            <div class="message" id="audioMessage">✅ Аудио готово! Используйте плеер для прослушивания.</div>
            <audio id="audioPlayer" controls></audio>
            <div class="audio-controls">
                <button class="btn btn-play" id="playBtn">▶️ Воспроизвести</button>
                <button class="btn btn-download" id="downloadBtn">⬇️ Скачать аудио</button>
                <button class="btn btn-clear" id="playAgainBtn" style="padding: 10px 24px; font-size: 14px;">
                    🔄 Заново
                </button>
            </div>
            <div class="download-info">Файл сохраняется в формате WebM (аудио). Воспроизводится в любом плеере.</div>
        </div>
    </div>

    <script>
        // Получаем все элементы
        const textInput = document.getElementById('textInput');
        const speakBtn = document.getElementById('speakBtn');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const playBtn = document.getElementById('playBtn');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const charCount = document.getElementById('charCount');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const audioSection = document.getElementById('audioSection');
        const audioPlayer = document.getElementById('audioPlayer');
        const audioMessage = document.getElementById('audioMessage');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        // Переменные
        let audioBlob = null;
        let audioUrl = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;

        // Обновление счетчика
        function updateCounter() {
            const len = textInput.value.length;
            charCount.textContent = len + ' символов';
        }

        // Обновление статуса
        function setStatus(text, type = 'idle') {
            statusText.textContent = text;
            statusDot.className = 'dot ' + type;
        }

        // Обновление прогресса
        function updateProgress(value) {
            progressFill.style.width = value + '%';
        }

        // Сброс аудио
        function resetAudio() {
            audioSection.classList.remove('show');
            audioPlayer.pause();
            audioPlayer.src = '';
            if (audioUrl) {
                URL.revokeObjectURL(audioUrl);
                audioUrl = null;
            }
            audioBlob = null;
            audioChunks = [];
            downloadBtn.disabled = true;
            playBtn.disabled = true;
            progressBar.classList.remove('active');
            updateProgress(0);
        }

        // Основная функция озвучивания
        async function speakText() {
            const text = textInput.value.trim();

            if (!text) {
                alert('Пожалуйста, введите текст на французском языке.');
                return;
            }

            if (!window.speechSynthesis) {
                alert('Ваш браузер не поддерживает синтез речи.');
                return;
            }

            // Останавливаем текущую речь
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            resetAudio();
            setStatus('Подготовка...', 'idle');
            speakBtn.disabled = true;
            downloadBtn.disabled = true;
            playBtn.disabled = true;

            try {
                // Создаем AudioContext
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Создаем MediaStreamDestination
                const destination = audioContext.createMediaStreamDestination();
                
                // Создаем utterance для речи
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.9;
                utterance.pitch = 1;

                // Ищем французский голос
                const voices = window.speechSynthesis.getVoices();
                const frenchVoice = voices.find(v => v.lang.startsWith('fr'));
                if (frenchVoice) {
                    utterance.voice = frenchVoice;
                }

                // Настраиваем MediaRecorder
                mediaRecorder = new MediaRecorder(destination.stream, {
                    mimeType: 'audio/webm;codecs=opus'
                });

                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    audioBlob = blob;
                    audioUrl = URL.createObjectURL(blob);
                    audioPlayer.src = audioUrl;
                    audioSection.classList.add('show');
                    downloadBtn.disabled = false;
                    playBtn.disabled = false;
                    setStatus('Аудио создано ✅', 'done');
                    speakBtn.disabled = false;
                    audioMessage.textContent = '✅ Аудио готово! Используйте плеер для прослушивания.';
                    progressBar.classList.remove('active');
                    updateProgress(100);
                };

                // Запускаем запись
                mediaRecorder.start();
                isRecording = true;
                progressBar.classList.add('active');
                updateProgress(10);

                // Воспроизводим речь
                utterance.onstart = () => {
                    setStatus('Говорит... 🎙️', 'speaking');
                    updateProgress(30);
                };

                utterance.onend = () => {
                    updateProgress(80);
                    setTimeout(() => {
                        if (mediaRecorder && mediaRecorder.state === 'recording') {
                            mediaRecorder.stop();
                            isRecording = false;
                            updateProgress(100);
                        }
                    }, 500);
                };

                utterance.onerror = (event) => {
                    console.error('Ошибка:', event);
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        isRecording = false;
                    }
                    setStatus('Ошибка', 'error');
                    speakBtn.disabled = false;
                    alert('Произошла ошибка при синтезе речи. Попробуйте другой текст.');
                };

                window.speechSynthesis.speak(utterance);

                // Таймаут
                setTimeout(() => {
                    if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                        mediaRecorder.stop();
                        isRecording = false;
                        setStatus('Таймаут', 'error');
                        speakBtn.disabled = false;
                    }
                }, 30000);

            } catch (error) {
                console.error('Ошибка:', error);
                setStatus('Ошибка', 'error');
                speakBtn.disabled = false;
                alert('Произошла ошибка при создании аудио.');
            }
        }

        // Скачивание аудио
        function downloadAudio() {
            if (!audioBlob) {
                alert('Сначала создайте аудио.');
                return;
            }

            const link = document.createElement('a');
            link.href = audioUrl;
            link.download = 'озвучка_французский.webm';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            audioMessage.textContent = '📥 Файл скачан в формате WebM (аудио).';
            setTimeout(() => {
                audioMessage.textContent = '✅ Аудио готово! Используйте плеер для прослушивания.';
            }, 3000);
        }

        // Воспроизведение
        function playAudio() {
            if (audioUrl) {
                audioPlayer.play();
                setStatus('Воспроизведение...', 'speaking');
                audioPlayer.onplay = () => setStatus('Воспроизведение...', 'speaking');
                audioPlayer.onended = () => setStatus('Готово ✅', 'done');
                audioPlayer.onpause = () => setStatus('Готово ✅', 'done');
            } else {
                alert('Сначала создайте аудио.');
            }
        }

        // Очистка
        function clearText() {
            textInput.value = '';
            updateCounter();
            setStatus('Очищено', 'idle');
            resetAudio();
            if (window.speechSynthesis && window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            speakBtn.disabled = false;
            downloadBtn.disabled = true;
            playBtn.disabled = true;
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                isRecording = false;
            }
        }

        // Повторное создание
        function playAgain() {
            speakText();
        }

        // Назначаем обработчики
        speakBtn.addEventListener('click', speakText);
        clearBtn.addEventListener('click', clearText);
        downloadBtn.addEventListener('click', downloadAudio);
        playBtn.addEventListener('click', playAudio);
        playAgainBtn.addEventListener('click', playAgain);
        textInput.addEventListener('input', updateCounter);

        // Загружаем голоса
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }

        // Инициализация
        updateCounter();
        setStatus('Готово', 'idle');
        downloadBtn.disabled = true;
        playBtn.disabled = true;
    </script>
</body>
</html>
